services:
  # محرك الذكاء الاصطناعي (Ollama)
  ollama-engine:
    image: ollama/ollama:latest
    container_name: knowledge_fortress_ai
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # واجهة المستخدم (للتعامل مع الحصن)
  knowledge-ui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: fortress_interface
    environment:
      - OLLAMA_BASE_URL=http://ollama-engine:11434
    ports:
      - "3000:8080"
    depends_on:
      - ollama-engine

volumes:
  ollama_data:
